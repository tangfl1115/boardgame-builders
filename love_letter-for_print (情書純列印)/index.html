        .force-print-bg {

        }

        body {

            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 預覽容器 - 縮放控制 */
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
            /* 預設縮放，避免佔用太多空間 */
            transform: scale(0.65); 
            transform-origin: top center;
            width: 100%;
        }

        /* A4 紙張模擬 */
        .sheet {
            width: 210mm;
            height: 297mm;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            margin-bottom: 50px; /* 紙張間距 */
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            
            /* 安全邊距 */
            padding-top: 10mm;
            padding-bottom: 10mm;
            overflow: hidden;
        }

        .grid-layout {
            display: grid;
            gap: 0;
            margin: 0;
            padding: 0;
            justify-content: center;
            align-content: center;
            flex-grow: 0;
            flex-shrink: 0;
        }

        .card-standard { width: 64mm; height: 89mm; margin: 0; }
        .card-medium   { width: 90mm; height: 130mm; margin: 0; }
        .card-large    { width: 180mm; height: 250mm; margin: 0 auto; }

        /* 背景紋理 */
        .royal-pattern {
            background-color: transparent;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHJlY3Qgd2lkdGg9IjEwIiBmaWxsPSIjY2JkNWUxIiBoZWlnaHQ9IjEwIi8+PHJlY3QgeD0iMTAiIHk9IjEwIiB3aWR0aD0iMTAiIGZpbGw9IiNjYmQ1ZTEiIGhlaWdodD0iMTAiLz48L3N2Zz4=");
            background-size: 20px 20px;
        }
        .flower-pattern {
            background-color: transparent;
            background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCI+PGNpcmNsZSBjeD0iNiIgY3k9IjYiIHI9IjMiIGZpbGw9IiNmYjkyM2MiLz48Y2lyY2xlIGN4PSIxOCIgY3k9IjE4IiByPSIzIiBmaWxsPSIjZmI5MjNjIi8+PC9zdmc+");

        }

        @media print {
            @page { size: A4; margin: 0; }
            .print-hidden, header, button, .fixed, .help-modal, #error-display { display: none !important; }
            body { background-color: white !important; margin: 0 !important; padding: 0 !important; }
            .min-h-screen { min-height: 0 !important; }
            
            .preview-container { 
                display: block; 
                padding: 0; 
                transform: none; /* 列印時取消縮放 */
            }

            .sheet {
                box-shadow: none;
                border: none;
                margin: 0 auto !important;
                page-break-after: always;
                break-after: page;
            }
        }

                    { pt: 5, title: "王子", en: "(2)", count: 2, desc: "指定一人棄牌重抽。" },
                    { pt: 4, title: "侍女", en: "(2)", count: 2, desc: "這一輪別人不能對你用牌。" },
                    { pt: 3, title: "男爵", en: "(2)", count: 2, desc: "和人比點數，小的輸。" },
                    { pt: 2, title: "牧師", en: "(2)", count: 2, desc: "看別人的手牌。" },
                    { pt: 1, title: "守衛", en: "(5)", count: 5, desc: "猜別人的手牌(非守衛)，猜中對方輸。" },
                ]
            }
        };

        const EmblemIcon = ({ iconKey, color, hex }) => {
            const IconPath = icons[iconKey];
            if (!IconPath) return null;
            return (
                <div className="relative w-full h-full flex items-center justify-center">
                    <div className="absolute inset-0 rounded-full opacity-20 transform scale-90" style={{ backgroundColor: hex }}></div>
                    <div className="relative w-[80%] h-[80%] rounded-full border-4 flex items-center justify-center shadow-inner" style={{ borderColor: hex, backgroundColor: '#ffffff' }}>
                        <div style={{ width: '60%', height: '60%', color: hex }}>
                            <Icon path={IconPath} color={hex} />
                        </div>
                    </div>
                </div>
            );
        };

        const CardBack = ({ size = 'standard', inkSaver = false, versionData }) => {
            const isLargePrint = size === 'large-print';
            const isMediumPrint = size === 'medium';
            const isSenior = versionData.id === 'zh-senior';
            
            return (
                <div 
                    className={`
                        relative flex flex-col items-center justify-center overflow-hidden shadow-xl box-border force-print-bg
                        ${isLargePrint ? 'card-large m-0' : (isMediumPrint ? 'card-medium m-0' : 'card-standard m-4 hover:scale-105 transition-transform')}
                        rounded-2xl
                    `}
                    style={{
                        width: isLargePrint ? '180mm' : (isMediumPrint ? '90mm' : '64mm'),
                        height: isLargePrint ? '250mm' : (isMediumPrint ? '130mm' : '89mm'),
                        // 移除 border 設定，確保無框線
                        backgroundColor: versionData.backColor,
                        printColorAdjust: 'exact',
                        WebkitPrintColorAdjust: 'exact'
                    }}
                >
                    <div className={`absolute inset-0 ${inkSaver ? '' : versionData.pattern} opacity-50 force-print-bg`}></div>
                    {/* 移除中央 Logo 與文字 div，確保是純幾何圖樣 */}
                </div>
            );
        };

        const Card = ({ card, size = 'standard', inkSaver = false, version }) => {
            const isLargePrint = size === 'large-print';
            const isMediumPrint = size === 'medium';
            const isSenior = version === 'zh-senior';
            
            const nameLength = card.name ? card.name.length : 0;
            const isLongName = nameLength > 7;

            const IconPath = icons[card.iconKey];

            if (card.isRuleCard) {
                return (
                    <div 
                        className={`
                            relative flex flex-col overflow-hidden shadow-xl box-border force-print-bg
                            ${isLargePrint ? 'card-large border-[8px] m-0 page-break' : (isMediumPrint ? 'card-medium border-[4px] m-0' : 'card-standard border-[2px] m-4 hover:scale-105 transition-transform')}
                            rounded-xl
                        `}
                        style={{ 
                            width: isLargePrint ? '180mm' : (isMediumPrint ? '90mm' : '64mm'),
                            height: isLargePrint ? '250mm' : (isMediumPrint ? '130mm' : '89mm'),
                            borderColor: '#1e293b',
                            backgroundColor: '#ffffff',
                            color: '#000000',
                            printColorAdjust: 'exact', 
                            WebkitPrintColorAdjust: 'exact'
                        }}
                    >
                        <div 
                            className="text-center shrink-0 border-b-2 border-slate-300 force-print-bg"
                            style={{ 
                                padding: isLargePrint ? '12px' : (isMediumPrint ? '8px' : '4px'), 
                                backgroundColor: inkSaver ? '#ffffff' : '#1a2332', 
                                color: inkSaver ? '#000000' : '#ffffff',
                                borderBottom: inkSaver ? '2px solid #000' : '2px solid #cbd5e1',
                                printColorAdjust: 'exact', 
                                WebkitPrintColorAdjust: 'exact'
                            }}
                        >
                            <h2 className={`font-sans font-bold tracking-widest ${isLargePrint ? 'text-4xl' : (isMediumPrint ? 'text-2xl' : 'text-base')}`}>
                                {version === 'en-standard' ? 'Rules Reference' : (isSenior ? '遊戲規則 (8種牌)' : '遊戲規則一覽')}
                            </h2>
                        </div>
                        <div className="flex-1 flex flex-col overflow-hidden bg-white force-print-bg">
                            <div className="flex-1 flex flex-col h-full justify-evenly"> 
                                {card.content.map((rule, idx) => (
                                    <div key={idx} className={`flex items-center border-b border-slate-100 last:border-0 px-1`} style={{ height: `${100 / card.content.length}%` }}>
                                        <span className={`w-[15%] text-center font-black text-[#c0392b] shrink-0 font-serif ${isLargePrint ? 'text-4xl' : (isMediumPrint ? 'text-3xl' : 'text-xl')}`}>
                                            {rule.pt}
                                        </span>
                                        <div className="w-[30%] leading-none shrink-0 flex flex-col justify-center pl-1">
                                            <div className={`font-black text-slate-800 ${isLargePrint ? 'text-3xl' : (isMediumPrint ? 'text-xl' : 'text-xs')}`}>{rule.title}</div>
                                            {!isSenior && <div className={`text-slate-500 font-bold ${isLargePrint ? 'text-xl mt-1' : (isMediumPrint ? 'text-sm' : 'text-[7px]')}`}>x {rule.count}</div>}
                                            {isSenior && <div className={`text-slate-500 font-bold ${isLargePrint ? 'text-xl mt-1' : (isMediumPrint ? 'text-sm' : 'text-[9px]')}`}>({rule.count}張)</div>}
                                        </div>
                                        <div className="flex-1 flex flex-col justify-center leading-none pl-0.5">
                                            <span className={`text-slate-800 font-bold ${isLargePrint ? 'text-2xl leading-tight' : (isMediumPrint ? 'text-sm leading-tight' : (isSenior ? 'text-[9px] leading-tight' : 'text-[8px] leading-[0.95] -ml-[1px]'))}`}>
                                                {rule.desc}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="text-center text-[6px] text-slate-400 shrink-0 force-print-bg" style={{ backgroundColor: '#f0f2f5', padding: '1px' }}>
                            {version === 'en-standard' ? 'Love Letter Rules' : 'Love Letter Rules Reference'}
                        </div>
                    </div>
                );
            }
            
            const bgStyle = inkSaver ? '#ffffff' : card.hex;
            const textStyle = inkSaver ? card.hex : '#ffffff';
            const borderStyle = inkSaver ? `6px solid ${card.hex}` : '6px solid #c5a059';

            // 字體大小控制
            const getTitleFontSize = () => {
                if (isLargePrint) return 'text-6xl';
                if (isMediumPrint) {
                    if (version === 'en-standard' && isLongName) return 'text-3xl';
                    return 'text-5xl';
                }
                // Standard size
                if (version === 'en-standard' && isLongName) return 'text-2xl'; // 縮小
                return isSenior ? 'text-2xl' : 'text-3xl';
            };

            return (
                <div 
                    className={`
                        relative flex flex-col overflow-hidden shadow-xl box-border force-print-bg
                        ${isLargePrint ? 'card-large m-0 page-break' : (isMediumPrint ? 'card-medium m-0' : 'card-standard m-4 hover:scale-105 transition-transform')}
                        rounded-2xl
                    `}
                    style={{
                        width: isLargePrint ? '180mm' : (isMediumPrint ? '90mm' : '64mm'),
                        height: isLargePrint ? '250mm' : (isMediumPrint ? '130mm' : '89mm'),
                        border: isLargePrint ? (inkSaver ? `12px solid ${card.hex}` : '12px solid #c5a059') : borderStyle,
                        backgroundColor: '#fffcf5',
                        printColorAdjust: 'exact',
                        WebkitPrintColorAdjust: 'exact'
                    }}
                >
                    {/* 1. 頂部標題區 */}
                    <div 
                        className={`relative flex items-center z-10 border-b-4 force-print-bg ${isLargePrint ? 'h-32 px-4' : (isMediumPrint ? 'h-24 px-3' : 'h-16 px-2')}`}
                        style={{
                            borderColor: inkSaver ? card.hex : '#c5a059',
                            background: inkSaver ? '#ffffff' : 'linear-gradient(to right, #f0e6d2, #fffcf5)',
                            printColorAdjust: 'exact',
                            WebkitPrintColorAdjust: 'exact'
                        }}
                    >
                        <div 
                            className={`
                                absolute flex items-center justify-center font-serif font-black rounded-full border-4 shadow-md z-20 force-print-bg
                                ${isLargePrint ? 'w-24 h-24 text-6xl -left-1 top-3' : (isMediumPrint ? 'w-20 h-20 text-5xl left-2 top-2' : 'w-14 h-14 text-4xl left-4 top-1')}
                            `}
                            style={{
                                borderColor: inkSaver ? card.hex : '#8b4513',
                                color: inkSaver ? '#000000' : '#8b4513',
                                backgroundColor: '#ffffff',
                                printColorAdjust: 'exact',
                                WebkitPrintColorAdjust: 'exact'
                            }}
                        >
                            {card.value}
                        </div>
                        
                        <div className={`w-full text-center ${isLargePrint ? 'pl-20' : 'pl-10'}`}>
                            <h2 className={`font-serif font-black tracking-widest ${getTitleFontSize()}`}
                                style={{ color: '#4a3728' }}>
                                {card.name}
                            </h2>
                        </div>
                    </div>

                    {/* 2. 視覺中心：文字替代圖示 */}
                    <div 
                        className="relative w-full flex flex-col items-center justify-center overflow-hidden force-print-bg p-2"
                        style={{
                            height: '45%', // 固定高度比例
                            backgroundColor: bgStyle,
                            color: textStyle,
                            printColorAdjust: 'exact',
                            WebkitPrintColorAdjust: 'exact'
                        }}
                    >
                        {!inkSaver && (
                            <div className="absolute inset-0 opacity-20" 
                                style={{ backgroundImage: 'radial-gradient(circle, #fff 2px, transparent 2px)', backgroundSize: '20px 20px' }}></div>
                        )}
                        
                        {/* 英文名稱 */}
                        <div className={`font-serif italic font-bold tracking-wider ${isLargePrint ? 'text-7xl mb-4' : (isMediumPrint ? 'text-5xl mb-2' : 'text-3xl mb-1')}`} 
                             style={{ opacity: 0.9 }}>
                            {card.enName}
                        </div>

                        {/* 中文功能總結 */}
                        <div className={`
                            font-sans font-black border-2 rounded-lg
                            ${isLargePrint ? 'text-9xl px-8 py-2 border-4' : (isMediumPrint ? 'text-6xl px-6 py-1 border-4' : (isSenior ? 'text-3xl px-3 py-0.5' : 'text-4xl px-3 py-0.5'))}
                        `} style={{ borderColor: textStyle }}>
                            {card.summary}
                        </div>
                    </div>

                    {/* 3. 效果說明區 */}
                    <div 
                        className={`relative flex items-center justify-center px-4 py-2 force-print-bg`}
                        style={{
                            height: 'auto',
                            flex: 1, // 自動填滿剩餘高度
                            backgroundColor: '#fff9eb',
                            borderTop: inkSaver ? `4px solid ${card.hex}` : '4px solid #c5a059',
                            printColorAdjust: 'exact',
                            WebkitPrintColorAdjust: 'exact',
                            zIndex: 20
                        }}
                    >
                        {!inkSaver && (
                        <>
                            <div className="absolute top-2 left-1/2 -translate-x-1/2 w-1/2 h-1 rounded-full opacity-30" style={{ backgroundColor: '#c5a059' }}></div>
                            <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-1/2 h-1 rounded-full opacity-30" style={{ backgroundColor: '#c5a059' }}></div>
                        </>
                        )}
                        
                        <p className={`
                            font-serif font-medium text-center tracking-wide
                            ${isLargePrint ? 'text-4xl px-8' : (isMediumPrint ? 'text-2xl px-6' : (isSenior ? 'text-xl font-bold leading-normal' : 'text-sm'))}
                        `} style={{ color: '#4a3728' }}>
                            {card.effect}
                        </p>
                    </div>
                </div>
            );
        };

        const chunkArray = (array, size) => {
            const result = [];
            for (let i = 0; i < array.length; i += size) {
                result.push(array.slice(i, i + size));
            }
            return result;
        };

        function App() {
            const [view, setView] = useState('gallery');
            const [currentVersion, setCurrentVersion] = useState('zh-standard');
            const [inkSaver, setInkSaver] = useState(false);
            const [fullPageBack, setFullPageBack] = useState(false);
            const [showHelp, setShowHelp] = useState(false);
            const [backColorOverride, setBackColorOverride] = useState('');

            const activeVersion = versions[currentVersion];
            const displayVersion = useMemo(() => {
                return {
                    ...activeVersion,
                    backColor: backColorOverride || activeVersion.backColor,
                    backBorder: backColorOverride || activeVersion.backBorder
                };
            }, [activeVersion, backColorOverride]);
            const activeCards = activeVersion.cards;
            const activeRule = activeVersion.rules;

            // 準備列印資料
            const allPrintCards = useMemo(() => {
                const cards = activeCards.flatMap(card => 
                    Array.from({ length: card.count }, () => card)
                );
                // 加上規則卡
                const ruleCardCount = 6;
                const ruleCards = Array.from({ length: ruleCardCount }, () => ({
                    id: 'rule',
                    isRuleCard: true,
                    content: activeRule
                }));
                return [...cards, ...ruleCards];
            }, [activeCards, activeRule]);

            // 計算每頁張數
            const actualCardsPerPage = view === 'print-6' ? 6 : (view === 'print-4' ? 4 : 9);

            const pages = chunkArray(allPrintCards, actualCardsPerPage);

            return (
                <div className="min-h-screen">
                    <div className="max-w-7xl mx-auto p-2 md:p-4 print-hidden">
                        <header className="bg-white p-3 rounded-xl shadow border border-stone-300 flex flex-col gap-3">
                            <div className="flex flex-wrap items-center justify-between gap-2">
                                <div>
                                    <h1 className="text-xl md:text-2xl font-black text-[#8b4513] flex items-center gap-2">
                                        <Icon path={icons.Heart} color="#DC2626" />
                                        情書卡牌生成器
                                    </h1>
                                    <div className="flex gap-2 mt-1">
                                        {Object.values(versions).map(v => (
                                            <button 
                                                key={v.id}
                                                onClick={() => setCurrentVersion(v.id)}
                                                className={`px-2 py-0.5 rounded text-xs font-bold border transition-colors ${currentVersion === v.id ? 'bg-[#8b4513] text-white border-[#8b4513]' : 'bg-white text-stone-500 border-stone-300'}`}
                                            >
                                                {v.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex gap-2 items-center">
                                    <div className="flex items-center gap-2 border-r pr-2 border-stone-200 mr-1">
                                        <span className="text-xs font-bold text-stone-500">卡背深色:</span>
                                        <div className="flex gap-1">
                                            {/* 預設顏色 */}
                                            <button
                                                type="button"
                                                onClick={() => setBackColorOverride('')}
                                                className={`w-5 h-5 rounded-full border transition-all cursor-pointer flex items-center justify-center text-[9px] font-bold ${!backColorOverride ? 'ring-2 ring-indigo-500 border-indigo-500 scale-110' : 'border-stone-300 hover:scale-105'}`}
                                                title="預設卡背"
                                                style={{ backgroundColor: activeVersion.backColor }}
                                            >
                                                {!backColorOverride && '✓'}
                                            </button>
                                            {[
                                                { name: '經典深紅', hex: '#881337' },
                                                { name: '爵士深藍', hex: '#1e3a8a' },
                                                { name: '墨綠森林', hex: '#064e3b' },
                                                { name: '尊爵深紫', hex: '#581c87' },
                                                { name: '暗影炭黑', hex: '#18181b' },
                                                { name: '巧克力棕', hex: '#451a03' }
                                            ].map(c => (
                                                <button
                                                    key={c.hex}
                                                    type="button"
                                                    onClick={() => setBackColorOverride(c.hex)}
                                                    className={`w-5 h-5 rounded-full border transition-all cursor-pointer flex items-center justify-center text-white text-[9px] ${backColorOverride === c.hex ? 'ring-2 ring-indigo-500 border-indigo-500 scale-110' : 'border-stone-300 hover:scale-105'}`}
                                                    style={{ backgroundColor: c.hex }}
                                                    title={c.name}
                                                >
                                                    {backColorOverride === c.hex && '✓'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button onClick={() => setInkSaver(!inkSaver)} className={`px-2 py-1 rounded text-xs border ${inkSaver ? 'bg-green-600 text-white' : 'bg-white'}`}>
                                        省墨模式
                                    </button>
                                    <button onClick={() => setFullPageBack(!fullPageBack)} className={`px-2 py-1 rounded text-xs border ${fullPageBack ? 'bg-pink-600 text-white' : 'bg-white'}`}>
                                        滿版背圖
                                    </button>
                                    <button onClick={() => window.print()} className="px-4 py-1 bg-stone-800 text-white rounded text-sm font-bold shadow hover:bg-stone-700 flex items-center gap-1">
                                        <Icon path={icons.Printer} color="white" size={16}/> 列印
                                    </button>
                                </div>
                            </div>

                            <div className="flex flex-wrap gap-2 border-t pt-2 border-stone-100 justify-center">
                                <button onClick={() => setView('gallery')} className={`px-3 py-1 rounded text-xs font-bold ${view === 'gallery' ? 'bg-[#8b4513] text-white' : 'text-stone-500 hover:bg-stone-100'}`}>瀏覽</button>
                                <button onClick={() => setView('print-standard')} className={`px-3 py-1 rounded text-xs font-bold ${view === 'print-standard' ? 'bg-blue-600 text-white' : 'text-stone-500 hover:bg-blue-50'}`}>雙面(9)</button>
                                <button onClick={() => setView('print-6')} className={`px-3 py-1 rounded text-xs font-bold ${view === 'print-6' ? 'bg-blue-600 text-white' : 'text-stone-500 hover:bg-blue-50'}`}>雙面(6)</button>
                                <button onClick={() => setView('print-4')} className={`px-3 py-1 rounded text-xs font-bold ${view === 'print-4' ? 'bg-blue-600 text-white' : 'text-stone-500 hover:bg-blue-50'}`}>雙面(4)</button>
                                <button onClick={() => setView('print-single')} className={`px-3 py-1 rounded text-xs font-bold ${view === 'print-single' ? 'bg-purple-600 text-white' : 'text-stone-500 hover:bg-purple-50'}`}>單張</button>
                            </div>
                        </header>
                    </div>

                    {view === 'gallery' ? (
                        <div className="gap-6 p-4 max-w-7xl mx-auto flex flex-wrap justify-center">
                            {activeCards.map(card => <Card key={card.id} card={card} inkSaver={inkSaver} version={currentVersion} />)}
                            <div className="w-full text-center mt-8">
                                <h2 className="text-xl font-bold text-stone-600 mb-2">卡背預覽</h2>
                                <div className="flex justify-center">
                                    <CardBack inkSaver={inkSaver} versionData={displayVersion} />
                                </div>
                            </div>
                        </div>
                    ) : (view === 'print-standard' || view === 'print-6' || view === 'print-4') ? (
                        <div className="preview-container">
                            {pages.map((pageCards, pageIndex) => (
                                <React.Fragment key={pageIndex}>
                                    <div className="sheet">
                                        <div className="grid-layout" style={{ 
                                            gridTemplateColumns: view === 'print-4' ? 'repeat(2, 90mm)' : 'repeat(3, 64mm)',
                                            gridTemplateRows: view === 'print-4' ? 'repeat(2, 130mm)' : (view === 'print-6' ? 'repeat(2, 89mm)' : 'repeat(3, 89mm)') 
                                        }}>
                                            {pageCards.map((card, idx) => (
                                                <Card 
                                                    key={`front-${pageIndex}-${idx}`} 
                                                    card={card} 
                                                    inkSaver={inkSaver} 
                                                    version={currentVersion}
                                                    size={view === 'print-4' ? 'medium' : 'standard'}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {fullPageBack ? (
                                        <div className="sheet" style={{ backgroundColor: displayVersion.backBorder }}>
                                        </div>
                                    ) : (
                                        <div className="sheet">
                                            <div className="grid-layout" style={{ 
                                                gridTemplateColumns: view === 'print-4' ? 'repeat(2, 90mm)' : 'repeat(3, 64mm)',
                                                gridTemplateRows: view === 'print-4' ? 'repeat(2, 130mm)' : (view === 'print-6' ? 'repeat(2, 89mm)' : 'repeat(3, 89mm)') 
                                            }}>
                                                {pageCards.map((_, idx) => (
                                                    <CardBack 
                                                        key={`back-${pageIndex}-${idx}`} 
                                                        inkSaver={inkSaver} 
                                                        versionData={displayVersion}
                                                        size={view === 'print-4' ? 'medium' : 'standard'}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </React.Fragment>
                            ))}
                        </div>
                    ) : (
                        <div className="bg-stone-200 p-8 gap-8 flex flex-wrap justify-center">
                            {allPrintCards.map((card, index) => (
                                <div key={`${card.id}-${index}`}>
                                    <Card card={card} size="large-print" inkSaver={inkSaver} version={currentVersion} />
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
